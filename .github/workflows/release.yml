name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: ai-plex-renamer-linux-x86_64
            binary: ai-plex-renamer
          - os: windows-latest
            asset_name: ai-plex-renamer-windows-x86_64
            binary: ai-plex-renamer.exe
          - os: macos-14
            asset_name: ai-plex-renamer-macos-arm64
            binary: ai-plex-renamer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build one-file binary
        run: >
          pyinstaller
          --clean
          --noconfirm
          --onefile
          --name ai-plex-renamer
          --collect-all guessit
          --collect-all babelfish
          --collect-all rebulk
          scripts/pyinstaller_entry.py

      - name: Smoke test binary on Unix
        if: runner.os != 'Windows'
        run: ./dist/ai-plex-renamer --help

      - name: Smoke test binary on Windows
        if: runner.os == 'Windows'
        run: .\dist\ai-plex-renamer.exe --help

      - name: Stage package contents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "package/${{ matrix.asset_name }}"
          cp "dist/${{ matrix.binary }}" "package/${{ matrix.asset_name }}/"
          cp README.md "package/${{ matrix.asset_name }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: package/${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-packages

      - name: Create release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for package_dir in release-packages/*; do
            [ -d "$package_dir" ] || continue
            asset_name="$(basename "$package_dir")"
            if [[ "$asset_name" == *windows* ]]; then
              (
                cd release-packages
                python3 -m zipfile -c "../release-assets/${asset_name}.zip" "$asset_name"
              )
            else
              tar -czf "release-assets/${asset_name}.tar.gz" -C release-packages "$asset_name"
            fi
          done
          ls -la release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
